<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PUP OUS Class Overview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --gold-900:#402d0c;
    --gold-700:#7c591d;
    --gold-500:#a37629;
    --accent-500:#f4d35e;
    --accent-100:#fdf3d9;
    --paper:#faf6ea;
    --card:#fffdf7;
    --line:#e3d3a0;
    --ink:#2b1210;
    --ink-soft:#6b5347;
    --error:#b3402a;
    --good:#2f6f42;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter', Arial, sans-serif;
    background:
      radial-gradient(circle at 15% 10%, rgba(92,70,15,0.06), transparent 40%),
      radial-gradient(circle at 90% 85%, rgba(244,211,94,0.14), transparent 45%),
      var(--paper);
    color:var(--ink);
    min-height:100vh;
    padding:32px 16px 60px;
  }
  .wrap{ max-width:760px; margin:0 auto; }

  .letterhead{
    background:linear-gradient(160deg, var(--gold-700) 0%, var(--gold-900) 100%);
    color:#fff;
    padding:16px 28px 22px;
    border-radius:12px 12px 0 0;
    border-bottom:4px solid var(--accent-500);
    box-shadow:0 8px 24px rgba(92,70,15,0.16);
  }
  .back-link{
    display:inline-flex;
    align-items:center;
    gap:5px;
    font-size:12px;
    font-weight:600;
    color:rgba(255,255,255,0.82);
    text-decoration:none;
    margin-bottom:10px;
    transition:color .15s ease;
  }
  .back-link:hover{ color:#fff; }
  .letterhead-divider{
    height:1px;
    background:rgba(255,255,255,0.18);
    margin-bottom:14px;
  }
  .letterhead-row{ display:flex; align-items:center; gap:14px; }
  .seal{
    flex:0 0 auto;
    width:52px; height:52px;
    border-radius:50%;
    border:2px solid var(--accent-500);
    display:flex; align-items:center; justify-content:center;
    font-family:'Playfair Display', serif;
    font-weight:700; font-size:15px;
    background:radial-gradient(circle, rgba(244,211,94,0.18), transparent 70%);
  }
  .eyebrow{
    margin:0 0 3px; font-size:11px; font-weight:700;
    letter-spacing:.14em; text-transform:uppercase; color:var(--accent-500);
  }
  h1{ margin:0; font-family:'Playfair Display', serif; font-weight:700; font-size:22px; }
  .page-desc{ margin:6px 0 0; font-size:12.5px; color:rgba(255,255,255,0.82); font-weight:500; }

  .content-card{
    background:var(--card);
    border:1px solid var(--line);
    border-top:none;
    border-radius:0 0 12px 12px;
    padding:24px 28px 28px;
    box-shadow:0 8px 24px rgba(92,70,15,0.10);
  }

  .status-msg{
    text-align:center;
    font-size:14px;
    color:var(--ink-soft);
    padding:20px 0;
  }
  .status-msg.error{ color:var(--error); font-weight:600; }

  .summary-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    margin-bottom:24px;
  }
  .summary-box{
    background:var(--accent-100);
    border-radius:10px;
    padding:14px 16px;
    text-align:center;
  }
  .summary-box .num{
    font-family:'Plus Jakarta Sans', sans-serif;
    font-weight:700;
    font-size:26px;
    color:var(--gold-900);
  }
  .summary-box .lbl{
    font-size:11.5px;
    color:var(--ink-soft);
    margin-top:2px;
  }

  .section-title{
    font-family:'Plus Jakarta Sans', sans-serif;
    font-weight:700;
    font-size:14px;
    text-transform:uppercase;
    letter-spacing:.04em;
    color:var(--gold-900);
    margin:26px 0 12px;
  }
  .section-title:first-of-type{ margin-top:0; }

  .subject-row{
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px 0;
    border-bottom:1px dashed var(--line);
  }
  .subject-row:last-child{ border-bottom:none; }
  .subject-name{
    flex:0 0 92px;
    font-size:13px;
    font-weight:700;
    color:var(--ink);
  }
  .bar-track{
    flex:1;
    height:8px;
    background:var(--accent-100);
    border-radius:6px;
    overflow:hidden;
  }
  .bar-fill{
    height:100%;
    background:var(--gold-500);
    border-radius:6px;
  }
  .subject-pct{
    flex:0 0 42px;
    text-align:right;
    font-size:13px;
    font-weight:700;
    color:var(--gold-700);
  }
  .subject-sub{
    font-size:11px;
    color:var(--ink-soft);
    margin-top:2px;
  }

  .low-list{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .low-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 14px;
    background:#fdfaf3;
    border:1px solid var(--line);
    border-radius:8px;
    font-size:13px;
  }
  .low-item .name{ font-weight:600; }
  .low-item .count{
    font-weight:700;
    color:var(--error);
  }

  .disclaimer{
    font-size:12px;
    line-height:1.5;
    color:var(--ink-soft);
    text-align:center;
    margin:20px 0 0;
  }

  .check-form{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:6px;
  }
  .check-form select, .check-form input{
    flex:1;
    min-width:140px;
    padding:10px 12px;
    font-size:14px;
    border:1px solid var(--line);
    border-radius:6px;
    background:#fdfcf9;
    color:var(--ink);
    font-family:inherit;
  }
  .check-form button{
    flex:0 0 auto;
    padding:10px 18px;
    background-image:linear-gradient(160deg, var(--gold-500), var(--gold-900));
    color:#fff;
    font-size:14px;
    font-weight:700;
    border:none;
    border-radius:6px;
    cursor:pointer;
  }
  .check-form button:disabled{ opacity:.6; cursor:not-allowed; }

  .check-summary-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    margin:16px 0;
  }
  .check-summary-box{
    border-radius:10px;
    padding:14px 16px;
    text-align:center;
  }
  .check-summary-box.present{ background:#e6f4ea; }
  .check-summary-box.absent{ background:#fbeceA; }
  .check-summary-box .num{
    font-family:'Plus Jakarta Sans', sans-serif;
    font-weight:700;
    font-size:26px;
  }
  .check-summary-box.present .num{ color:var(--good); }
  .check-summary-box.absent .num{ color:var(--error); }
  .check-summary-box .lbl{
    font-size:11.5px;
    color:var(--ink-soft);
    margin-top:2px;
  }

  .absentee-list{
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .absentee-item{
    padding:8px 14px;
    background:#fbeceA;
    border:1px solid #f0cfcb;
    border-radius:8px;
    font-size:13px;
    font-weight:600;
    color:var(--error);
  }
  .absentee-item span{
    color:var(--ink-soft);
    font-weight:400;
  }
  .present-item{
    padding:8px 14px;
    background:#e6f4ea;
    border:1px solid #bfe3cc;
    border-radius:8px;
    font-size:13px;
    font-weight:600;
    color:var(--good);
  }
  .present-item span{
    color:var(--ink-soft);
    font-weight:400;
  }
  .roster-columns{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-top:16px;
  }
  .roster-col-title{
    font-size:11.5px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.04em;
    margin-bottom:8px;
  }
  .roster-col-title.present-title{ color:var(--good); }
  .roster-col-title.absent-title{ color:var(--error); }

  @media (max-width:480px){
    .roster-columns{ grid-template-columns:1fr; }
  }

  .activity-chevron{
    flex:0 0 auto;
    font-size:11px;
    color:var(--ink-soft);
    transition:transform .15s ease;
    margin-left:4px;
  }
  .activity-detail{
    margin:0 0 14px 92px;
    padding:10px 12px;
    background:#fdfaf3;
    border:1px solid var(--line);
    border-radius:8px;
  }
  .activity-date-row{
    display:flex;
    align-items:center;
    gap:10px;
    padding:5px 0;
  }
  .activity-date-label{
    flex:0 0 84px;
    font-size:11.5px;
    color:var(--ink-soft);
  }
  .activity-date-pct{
    flex:0 0 46px;
    text-align:right;
    font-size:11.5px;
    font-weight:700;
    color:var(--gold-700);
  }

  .trend-bars{
    display:flex;
    align-items:flex-end;
    gap:10px;
    height:120px;
    padding:0 4px;
    margin-bottom:8px;
  }
  .trend-col{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    height:100%;
    justify-content:flex-end;
  }
  .trend-bar-track{
    width:100%;
    max-width:36px;
    height:80px;
    display:flex;
    align-items:flex-end;
    background:var(--accent-100);
    border-radius:5px;
    overflow:hidden;
  }
  .trend-bar-fill{
    width:100%;
    background:linear-gradient(180deg, var(--gold-500), var(--gold-700));
    border-radius:5px 5px 0 0;
    min-height:3px;
  }
  .trend-value{
    font-size:12px;
    font-weight:700;
    color:var(--gold-900);
    margin-top:6px;
  }
  .trend-label{
    font-size:10px;
    color:var(--ink-soft);
    margin-top:2px;
  }
  .trend-delta{
    text-align:center;
    font-size:12.5px;
    font-weight:600;
    padding:6px 0 4px;
  }
  .trend-up{ color:var(--good); }
  .trend-down{ color:var(--error); }
  .trend-flat{ color:var(--ink-soft); }
</style>
</head>
<body>

<div class="wrap">
  <div class="letterhead">
    <a class="back-link" href="index.html">&larr; Back to Dashboard</a>
    <div class="letterhead-divider"></div>
    <div class="letterhead-row">
      <div class="seal">PUP</div>
      <div>
        <p class="eyebrow">BSOAOUMN 2-7</p>
        <h1>Class Overview</h1>
        <p class="page-desc">A snapshot of attendance and activity completion across the whole class.</p>
      </div>
    </div>
  </div>

  <div class="content-card">
    <div class="section-title" style="margin-top:0;">Check Attendance for a Date</div>
    <div class="check-form">
      <select id="checkSubject">
        <option value="" disabled selected>Select a subject</option>
        <option value="ENGL 017">ENGL 017</option>
        <option value="GEED 033">GEED 033</option>
        <option value="OFAD 201">OFAD 201</option>
        <option value="PATHFIT 3">PATHFIT 3</option>
        <option value="GEED 003">GEED 003</option>
        <option value="OFAD 203">OFAD 203</option>
        <option value="OFAD 202">OFAD 202</option>
      </select>
      <input type="date" id="checkDate">
      <button id="checkBtn" type="button">Check</button>
    </div>
    <p id="checkStatus" class="status-msg" style="display:none; padding:8px 0;"></p>
    <div id="checkResult"></div>

    <div class="letterhead-divider" style="background:var(--line); margin:24px 0;"></div>

    <div id="statusMsg" class="status-msg">Loading class overview&hellip;</div>
    <div id="overviewContent" style="display:none;"></div>
  </div>

  <p class="disclaimer">This overview is for the exclusive use of BSOAOUMN 2-7 officers for academic monitoring purposes only.</p>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwfJd5swbGgfrGDgy_22suW9T0t_XEKC894fWgctgQ1rClw0sZfA_g9-bBf3kRGC-5n/exec";

  const statusMsg = document.getElementById('statusMsg');
  const content = document.getElementById('overviewContent');

  const checkSubject = document.getElementById('checkSubject');
  const checkDate = document.getElementById('checkDate');
  const checkBtn = document.getElementById('checkBtn');
  const checkStatus = document.getElementById('checkStatus');
  const checkResult = document.getElementById('checkResult');

  checkDate.valueAsDate = new Date();

  checkBtn.addEventListener('click', () => {
    const subject = checkSubject.value;
    const date = checkDate.value;

    if (!subject || !date){
      checkStatus.textContent = "Please choose both a subject and a date.";
      checkStatus.className = "status-msg error";
      checkStatus.style.display = 'block';
      checkResult.innerHTML = '';
      return;
    }

    checkBtn.disabled = true;
    checkBtn.textContent = "Checking...";
    checkStatus.textContent = "Checking...";
    checkStatus.className = "status-msg";
    checkStatus.style.display = 'block';
    checkResult.innerHTML = '';

    const url = SCRIPT_URL
      + "?action=getAttendanceForDate"
      + "&subject=" + encodeURIComponent(subject)
      + "&date=" + encodeURIComponent(date);

    fetch(url)
      .then(res => res.json())
      .then(data => {
        if (data.error){
          checkStatus.textContent = data.error;
          checkStatus.className = "status-msg error";
          return;
        }
        checkStatus.style.display = 'none';

        let html = `<div class="check-summary-row">
          <div class="check-summary-box present"><div class="num">${data.presentCount}</div><div class="lbl">Present</div></div>
          <div class="check-summary-box absent"><div class="num">${data.absentCount}</div><div class="lbl">Absent</div></div>
        </div>`;

        html += `<div class="roster-columns">`;

        html += `<div><div class="roster-col-title present-title">Present (${data.presentCount})</div>`;
        if (data.presentees && data.presentees.length > 0){
          html += `<div class="absentee-list">`;
          data.presentees.forEach(s => {
            html += `<div class="present-item">${s.name} <span>(${s.studentNumber})</span></div>`;
          });
          html += `</div>`;
        } else {
          html += `<p class="status-msg" style="padding:6px 0; text-align:left;">No one checked in yet.</p>`;
        }
        html += `</div>`;

        html += `<div><div class="roster-col-title absent-title">Absent (${data.absentCount})</div>`;
        if (data.absentees && data.absentees.length > 0){
          html += `<div class="absentee-list">`;
          data.absentees.forEach(s => {
            html += `<div class="absentee-item">${s.name} <span>(${s.studentNumber})</span></div>`;
          });
          html += `</div>`;
        } else {
          html += `<p class="status-msg" style="padding:6px 0; text-align:left;">Everyone was present. Nice!</p>`;
        }
        html += `</div>`;

        html += `</div>`;

        checkResult.innerHTML = html;
      })
      .catch(() => {
        checkStatus.textContent = "Could not connect. Check your internet and try again.";
        checkStatus.className = "status-msg error";
      })
      .finally(() => {
        checkBtn.disabled = false;
        checkBtn.textContent = "Check";
      });
  });

  function formatWeekLabel(weekStartStr){
    const d = new Date(weekStartStr + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
  }

  function renderWeeklyTrend(weeklyTrend){
    let html = `<div class="section-title">Weekly Attendance Trend</div>`;

    if (!weeklyTrend || weeklyTrend.length === 0){
      return html + `<p class="status-msg">Not enough data yet.</p>`;
    }

    const maxStudents = Math.max(...weeklyTrend.map(w => w.uniqueStudents), 1);

    html += `<div class="trend-bars">`;
    weeklyTrend.forEach(w => {
      const heightPct = Math.round((w.uniqueStudents / maxStudents) * 100);
      html += `<div class="trend-col">
        <div class="trend-bar-track"><div class="trend-bar-fill" style="height:${heightPct}%"></div></div>
        <div class="trend-value">${w.uniqueStudents}</div>
        <div class="trend-label">${formatWeekLabel(w.weekStart)}</div>
      </div>`;
    });
    html += `</div>`;

    if (weeklyTrend.length >= 2){
      const last = weeklyTrend[weeklyTrend.length - 1];
      const prev = weeklyTrend[weeklyTrend.length - 2];
      const diff = last.uniqueStudents - prev.uniqueStudents;
      let deltaText, deltaClass;
      if (diff > 0){ deltaText = `&#9650; ${diff} more student(s) than last week`; deltaClass = 'trend-up'; }
      else if (diff < 0){ deltaText = `&#9660; ${Math.abs(diff)} fewer student(s) than last week`; deltaClass = 'trend-down'; }
      else { deltaText = `Same as last week`; deltaClass = 'trend-flat'; }
      html += `<div class="trend-delta ${deltaClass}">${deltaText}</div>`;
    }

    return html;
  }

  function bar(pct){
    const safe = Math.max(0, Math.min(100, pct));
    return `<div class="bar-track"><div class="bar-fill" style="width:${safe}%"></div></div>`;
  }

  function loadOverview(){
    if (SCRIPT_URL.includes("PASTE_YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE")){
      statusMsg.textContent = "Setup needed: add your Google Apps Script Web App URL in the code.";
      statusMsg.className = "status-msg error";
      return;
    }

    fetch(SCRIPT_URL + "?action=getOverview")
      .then(res => res.json())
      .then(data => {
        if (data.error){
          statusMsg.textContent = data.error;
          statusMsg.className = "status-msg error";
          return;
        }
        render(data);
        statusMsg.style.display = 'none';
        content.style.display = 'block';
      })
      .catch(() => {
        statusMsg.textContent = "Could not connect. Check your internet and try again.";
        statusMsg.className = "status-msg error";
      });
  }

  function render(data){
    let html = '';

    html += `<div class="summary-row">
      <div class="summary-box"><div class="num">${data.totalStudents}</div><div class="lbl">Total Students</div></div>
      <div class="summary-box"><div class="num">${Object.keys(data.attendanceBySubject).length}</div><div class="lbl">Subjects Tracked</div></div>
    </div>`;

    html += `<div class="section-title">Attendance Participation by Subject</div>`;
    const attSubjects = Object.keys(data.attendanceBySubject).sort();
    if (attSubjects.length === 0){
      html += `<p class="status-msg">No attendance records yet.</p>`;
    } else {
      attSubjects.forEach(subj => {
        const s = data.attendanceBySubject[subj];
        const creditedNote = s.creditedStudents > 0 ? ` &middot; ${s.creditedStudents} credited (excluded)` : '';
        html += `<div class="subject-row">
          <div class="subject-name">${subj}</div>
          ${bar(s.participationRate)}
          <div class="subject-pct">${s.participationRate}%</div>
        </div>
        <div class="subject-sub" style="margin:-6px 0 6px 92px;">${s.uniqueStudents} of ${s.enrolledStudents} enrolled &middot; ${s.totalSubmissions} total check-ins${creditedNote}</div>`;
      });
    }

    html += `<div class="section-title">Activity Completion by Subject</div>`;
    const actSubjects = Object.keys(data.activityBySubject).sort();
    if (actSubjects.length === 0){
      html += `<p class="status-msg">No dated activities set up yet.</p>`;
    } else {
      actSubjects.forEach((subj, idx) => {
        const s = data.activityBySubject[subj];
        const creditedNote = s.creditedStudents > 0 ? ` &middot; ${s.creditedStudents} credited (excluded)` : '';
        const rowId = 'act-detail-' + idx;
        html += `<div class="subject-row activity-toggle" data-target="${rowId}" style="cursor:pointer;">
          <div class="subject-name">${subj}</div>
          ${bar(s.completionRate)}
          <div class="subject-pct">${s.completionRate}%</div>
          <span class="activity-chevron">&#9656;</span>
        </div>
        <div class="subject-sub" style="margin:-6px 0 6px 92px;">${s.enrolledStudents} enrolled &middot; ${s.activitiesTracked} activity date(s)${creditedNote}</div>
        <div class="activity-detail" id="${rowId}" style="display:none;">`;

        s.byDate.forEach(d => {
          html += `<div class="activity-date-row">
            <span class="activity-date-label">${d.date}</span>
            ${bar(d.completionRate)}
            <span class="activity-date-pct">${d.doneCount}/${d.possible}</span>
          </div>`;
        });

        html += `</div>`;
      });
    }

    html += renderWeeklyTrend(data.weeklyTrend);

    html += `<div class="section-title">Students With Lowest Attendance</div>`;
    if (!data.lowAttendanceStudents || data.lowAttendanceStudents.length === 0){
      html += `<p class="status-msg">Not enough data yet.</p>`;
    } else {
      html += `<div class="low-list">`;
      data.lowAttendanceStudents.forEach(s => {
        html += `<div class="low-item">
          <span class="name">${s.name} <span style="color:var(--ink-soft); font-weight:400;">(${s.studentNumber})</span></span>
          <span class="count">${s.attendanceCount} check-in(s)</span>
        </div>`;
      });
      html += `</div>`;
    }

    content.innerHTML = html;

    content.querySelectorAll('.activity-toggle').forEach(row => {
      row.addEventListener('click', () => {
        const target = document.getElementById(row.getAttribute('data-target'));
        const chevron = row.querySelector('.activity-chevron');
        const isOpen = target.style.display === 'block';
        target.style.display = isOpen ? 'none' : 'block';
        if (chevron) chevron.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(90deg)';
      });
    });
  }

  loadOverview();
</script>

</body>
</html>
